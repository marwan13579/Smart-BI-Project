<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول النظام | Intelligent Data Analysis Automation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="Assets/css/style.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055644.png" type="image/png">
</head>
<body class="auth-page">

<div class="position-fixed top-0 end-0 p-3" style="z-index: 1000;">
    <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-stars-fill"></i>
    </button>
</div>

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-logo-wrapper">
                <img src="Assets/img/logomci.jpeg" alt="MCI Logo" height="70">
            </div>
            <h3 class="fw-bold mt-3 auth-title" id="authTitle">تسجيل الدخول</h3>
            <p class="text-muted small" id="authSubtitle">مرحباً بك في Intelligent Data Analysis Automation System </p>
        </div>

        <form id="authForm">
            <div class="mb-3 text-start">
                <label class="form-label fw-semibold small">
                    <i class="bi bi-envelope-fill text-primary me-1"></i> البريد الإلكتروني
                </label>
                <input type="email" id="authEmail" class="form-control form-control-lg" required placeholder="name@example.com">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-semibold small">
                    <i class="bi bi-lock-fill text-primary me-1"></i> كلمة المرور
                </label>
                <input type="password" id="authPassword" class="form-control form-control-lg" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="authBtn">
                <span id="btnText">دخول</span>
                <div class="spinner-border spinner-border-sm ms-2" id="loadingSpinner" style="display: none;" role="status"></div>
            </button>
        </form>

        <div class="text-center">
            <a href="#" id="toggleAuth" class="text-decoration-none toggle-auth-link">
                <i class="bi bi-person-plus-fill me-1"></i>
                <span>ليس لديك حساب؟ إنشاء حساب جديد</span>
            </a>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1100;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    
    // Dark Mode Logic
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    themeToggle?.addEventListener('click', () => {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });

    // Auth Toggle (Login / Register)
    let isLoginMode = true;
    const toggleAuth = document.getElementById('toggleAuth');
    const authTitle = document.getElementById('authTitle');
    const authBtn = document.getElementById('authBtn');
    const btnText = document.getElementById('btnText');

    toggleAuth.onclick = (e) => {
        e.preventDefault();
        isLoginMode = !isLoginMode;
        authTitle.innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
        btnText.innerText = isLoginMode ? "دخول" : "تسجيل";
        toggleAuth.innerHTML = isLoginMode ? 
            '<i class="bi bi-person-plus-fill me-1"></i><span>ليس لديك حساب؟ إنشاء حساب جديد</span>' : 
            '<i class="bi bi-box-arrow-in-right me-1"></i><span>لديك حساب بالفعل؟ سجل دخولك</span>';
    };

    // Toast Function
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const id = 'toast-' + Date.now();
        const bgColor = type === 'success' ? 'bg-success' : type === 'error' ? 'bg-danger' : 'bg-primary';
        const icon = type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill';
        
        const html = `
            <div id="${id}" class="toast align-items-center text-white ${bgColor} border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="d-flex p-2">
                    <div class="toast-body d-flex align-items-center gap-2">
                        <i class="bi ${icon} fs-5"></i> ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>`;
        
        container.insertAdjacentHTML('beforeend', html);
        const el = document.getElementById(id);
        const toast = new bootstrap.Toast(el, { delay: 3000 });
        toast.show();
        el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    // API Submission
    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const spinner = document.getElementById('loadingSpinner');
        
        authBtn.disabled = true;
        spinner.style.display = 'inline-block';
        btnText.innerText = isLoginMode ? "جاري الدخول..." : "جاري التسجيل...";

        const endpoint = isLoginMode ? '/login' : '/register';

        try {
            const response = await fetch(`https://aaas.pythonanywhere.com${endpoint}`, {            
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json().catch(() => ({}));

            if (response.ok) {
                localStorage.setItem('currentUser', JSON.stringify({ email }));
                showToast(isLoginMode ? "تم تسجيل الدخول بنجاح!" : "تم إنشاء الحساب بنجاح!", "success");
                setTimeout(() => window.location.href = "index.html", 1500);
            } else {
                showToast(data.message || "البريد الإلكتروني أو كلمة المرور غير صحيحة", "error");
                resetUI();
            }
        } catch (error) {
            showToast("تعذر الاتصال بالسيرفر السحابي", "error");
            resetUI();
        }
    };

    function resetUI() {
        authBtn.disabled = false;
        document.getElementById('loadingSpinner').style.display = 'none';
        btnText.innerText = isLoginMode ? "دخول" : "تسجيل";
    }
</script>

</body>
</html>
